<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
    <link rel="apple-touch-icon" href="/favicon.svg?v=3" />
    <link rel="shortcut icon" href="/favicon.svg?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Emily Lucas, Executive Producer specializing in luxury campaigns across fashion, beauty, hospitality and editorial. Clients include MR PORTER, Aman, Condé Nast, One&Only, Charlotte Tilbury, Vogue Arabia, Nike, Mastercard." />
    <meta property="og:title" content="Emily Lucas, Executive Producer" />
    <meta property="og:description" content="Executive Producer specializing in luxury campaigns across fashion, beauty, hospitality and editorial. Clients include MR PORTER, Aman, Condé Nast, One&Only, Charlotte Tilbury, Vogue Arabia, Nike, Mastercard." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://emilyelucas.com" />
    <meta property="og:image" content="https://emilyelucas.com/hero.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <!-- menu/contact bgs are tiny (~16–24KB) and used everywhere; keep
         the preload. Showreel (11MB) and hero.jpg are landing-page-only
         assets — loading them on /work and other routes blocked mobile
         first paint badly, so they're left to lazy-load from the component. -->
    <link rel="preload" as="image" href="/menu-bg.jpg" />
    <link rel="preload" as="image" href="/contact-bg.jpg" />
    <title>Emily Lucas, Executive Producer</title>
    <style>
      @font-face {
        font-family: 'Sackers Gothic Std';
        src: url('/fonts/sackers-gothic-heavy.otf') format('opentype');
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Unica 77';
        src: url('/fonts/unica77-light.woff2') format('woff2');
        font-weight: 300;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Unica 77';
        src: url('/fonts/unica77-regular.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Unica 77';
        src: url('/fonts/unica77-medium.woff2') format('woff2');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Unica 77';
        src: url('/fonts/unica77-bold.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Avenir';
        src: url('/fonts/avenir-regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Avenir';
        src: url('/fonts/avenir-heavy.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Avenir';
        src: url('/fonts/avenir-black.ttf') format('truetype');
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Impact';
        src: url('/fonts/Impact.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'TeX Gyre Heros';
        src: url('/fonts/texgyreheros-regular.otf') format('opentype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'TeX Gyre Heros';
        src: url('/fonts/texgyreheros-bold.otf') format('opentype');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      html, body { margin: 0; padding: 0; }
      * { box-sizing: border-box; }

      /* Snap scroll between WorkHero and the work section, toggled per page
         via Work.jsx (added to <html> on mount, removed on unmount). */
      .work-snap-html { scroll-snap-type: y mandatory; }
      .work-snap-section { scroll-snap-align: start; scroll-snap-stop: always; }

      /* Snap scroll between Category page sections (hero / about / showcase).
         Use proximity (not mandatory) so the user can scroll past the last
         snap target to reach the page footer beneath. */
      .category-snap-html {
        scroll-snap-type: y proximity;
        scroll-padding-top: 0;
      }
      .category-snap-section {
        scroll-snap-align: start;
      }

      /* ─────────────────────────────────────────────────────────────
         Mobile overrides, ≤768px. Inline styles use !important to
         beat the JS-applied desktop defaults. Class-name conventions:
           .m-pad-x   = page horizontal padding
           .m-hero-tl/br/bl = hero corner labels
           .m-section = two-column about/brands sections
           .m-category-slide = inline category strip on landing
           .m-corner-modal = the 340px corner cards
           .m-work-grid    = Work page sticky grid
         ───────────────────────────────────────────────────────────── */
      @media (max-width: 768px) {
        /* Disable custom cursor on touch, pointer is OS-driven */
        .landing-snap, .landing-snap *, .work-page, .work-page * {
          cursor: auto !important;
        }

        /* + button, closer to edge, smaller */
        .m-plus { top: 14px !important; right: 16px !important; font-size: 44px !important; }

        /* Hero section: landscape banner on mobile (image's native ~4:3),
           not a portrait full-bleed crop. */
        .m-hero-section {
          height: auto !important;
          aspect-ratio: 4 / 3 !important;
          min-height: 280px !important;
        }

        /* Hero corner labels, bottom-row baseline-aligned to the title */
        .m-hero-tl { top: 16px !important; left: 16px !important; }
        .m-hero-br { bottom: 16px !important; right: 16px !important; }
        .m-hero-bl { bottom: 16px !important; left: 16px !important; }
        .m-hero-title { font-size: 36px !important; }
        .m-hero-roles { font-size: 10px !important; line-height: 1.4 !important; }
        .m-portfolio-label { font-size: 11px !important; margin-bottom: 4px !important; }

        /* About / Brands two-column sections.
           height: auto !important so the body text can flow naturally on
           narrow screens (Landing/Category pages set inline height: 100vh
           for desktop snap, which crops content on mobile).
           padding-bottom leaves room for the absolute down-arrow so it
           doesn't overlap the last line of body copy. */
        .m-section {
          padding: 32px 16px 32px !important;
          grid-template-columns: 1fr !important;
          gap: 12px !important;
          height: auto !important;
          min-height: 0 !important;
        }
        .m-section-title { font-size: 22px !important; padding-top: 0 !important; }
        .m-section-body { font-size: 16px !important; line-height: 1.35 !important; }
        /* Landing's About has no down arrow — tighter bottom padding than
           category pages (which keep the 72px reserve). */
        .m-section-about { padding-bottom: 44px !important; }
        .m-section-coda { font-size: 17px !important; margin-top: 16px !important; }

        /* /about body — match mobile gutters to the rest of the site */
        .m-about-body { padding: 20px 16px !important; overflow-y: auto !important; }
        .m-about-title { font-size: 48px !important; }
        .m-about-bio { max-width: 100% !important; font-size: 15px !important; margin-top: 16px !important; }
        .m-about-grid { grid-template-columns: 1fr !important; gap: 24px !important; margin-top: 24px !important; max-width: 100% !important; }

        /* CategorySlide, stack label above carousel */
        .m-category-slide {
          grid-template-columns: 1fr !important;
          padding: 14px 16px !important;
          gap: 8px !important;
        }

        /* Credentials carousel, keep portrait-default carousels portrait,
           keep the landscape category landscape. Per-item landscape overrides
           within a portrait carousel use the portrait size on mobile (acceptable
           simplification, keeps thumbs visually consistent). */
        .m-carousel > div > div { height: 220px !important; width: 165px !important; }
        .m-carousel.m-carousel-landscape > div > div { height: 150px !important; width: 220px !important; }

        /* View More / Contact buttons row */
        .m-link-row { padding: 14px 16px !important; }
        .m-link-row a, .m-link-row button { font-size: 16px !important; }

        /* Corner modals (Menu + Contact), anchor with 12px gutters,
           and let height grow to content so text doesn't overflow */
        .m-corner-modal {
          width: calc(100vw - 24px) !important;
          aspect-ratio: auto !important;
          max-height: calc(100vh - 24px) !important;
          padding: 20px 22px !important;
        }
        .m-corner-modal.m-contact-modal { right: 12px !important; bottom: 12px !important; }
        .m-corner-modal.m-menu-modal    { right: 12px !important; top: 12px !important; }

        /* Footer */
        .m-footer { padding: 24px 16px !important; }
        .m-footer > div { font-size: 13px !important; }

        /* Work page mobile */
        .m-work-section { height: auto !important; }
        .m-work-grid { grid-template-columns: 1fr !important; height: auto !important; }
        .m-work-list { padding: 32px 16px 24px !important; width: 100% !important; }
        .m-work-list-header { font-size: 18px !important; margin-bottom: 12px !important; }
        .m-work-list button { font-size: 12px !important; white-space: normal !important; padding: 6px 0 !important; }
        .m-work-list button span:first-child { width: 24px !important; }
        .m-scattered { display: none !important; }
        .m-work-fade-top, .m-work-fade-bottom { display: none !important; }
        .m-case-panel {
          position: fixed !important;
          inset: 12px !important;
          width: auto !important; right: 12px !important; left: 12px !important;
          max-height: calc(100vh - 24px) !important;
        }
        /* Mobile case popup keeps the bubble framing, full border + rounded
           corners (desktop uses just top/bottom hairlines for an editorial frame). */
        .m-case-popup {
          border: 1px solid #1a1a1a !important;
          border-radius: 18px !important;
        }

        /* WorkDetail body */
        .m-workdetail-body { padding: 24px 16px 48px !important; }
        .m-workdetail-body h1 { font-size: 18px !important; }
        .m-workdetail-body h2 { font-size: 28px !important; }

        /* Category showcase (AutoCycleHero) — landscape banner on mobile
           (instead of full 100vh portrait), tighter overlay/numbers. */
        .m-showcase-section {
          height: auto !important;
          aspect-ratio: 4 / 3 !important;
          min-height: 240px !important;
        }
        .m-showcase-bottom {
          bottom: 12px !important;
          padding: 0 14px !important;
          gap: 12px !important;
        }
        .m-showcase-numbers { gap: 10px !important; }
        .m-showcase-numbers button { font-size: 16px !important; }
        .m-showcase-overlay > div:first-child { font-size: 16px !important; }
        .m-showcase-overlay > div:nth-child(2) { font-size: 10px !important; }

        /* Mobile scroll-snap is heavy/buggy in some browsers; relax to
           proximity so the user keeps fluid touch-scroll. */
        .category-snap-html { scroll-snap-type: y proximity !important; }

        /* Case-study popup modal — slightly shorter on mobile so the
           card doesn't dominate the viewport. */
        .cs-modal-card {
          width: calc(100vw - 24px) !important;
          height: min(540px, calc(100vh - 120px)) !important;
          border-radius: 12px !important;
        }
        .cs-modal-card > .cs-card-scroll {
          padding: 14px 16px 16px !important;
          /* Restrict outer modal scroll to vertical so horizontal swipes
             on the inner carousel reach it without being captured here. */
          touch-action: pan-y !important;
        }

        /* Category page footer — slimmer on mobile */
        .m-category-footer {
          padding: 18px 16px 14px !important;
          font-size: 13px !important;
        }

        /* Showcase overlay overflow fix: the 260px reserved width on
           desktop was clipping the client/title on narrow mobile screens.
           Allow it to shrink and wrap naturally on mobile. */
        .m-showcase-overlay {
          flex: 0 1 auto !important;
          max-width: 50% !important;
        }
        .m-showcase-bottom { padding: 0 10px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
